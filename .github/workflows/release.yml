name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  id-token: write # OIDC token issuance for NuGet Trusted Publishing

env:
  CI: "true"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  release:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    # Protected environment: bound to the nuget.org Trusted Publishing policy and (optionally) manual approval.
    environment: nuget-release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          # Split prerelease suffix if present (e.g. 0.1.0-preview.1)
          PREFIX="${TAG%%-*}"
          SUFFIX=""
          case "$TAG" in *-*) SUFFIX="${TAG#*-}";; esac
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore /p:VersionPrefix=${{ steps.version.outputs.prefix }} /p:VersionSuffix=${{ steps.version.outputs.suffix }}

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: dotnet pack --configuration Release --no-build -o artifacts /p:VersionPrefix=${{ steps.version.outputs.prefix }} /p:VersionSuffix=${{ steps.version.outputs.suffix }}

      - name: Validate packages
        run: bash build/validate-packages.sh artifacts

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived (1 h) API key.
      # The matching policy on nuget.org is owned by user kora.kanchan and pins this
      # repository, this workflow file (release.yml), and the nuget-release environment.
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: kora.kanchan

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/*.nupkg
            artifacts/*.snupkg
